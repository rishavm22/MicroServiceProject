openapi: 3.0.3
info:
  title: MicroServiceProject API
  description: API for user management, account management, and document generation
  version: 0.0.1-SNAPSHOT
  contact:
    name: Rishav Mishra

servers:
  - url: http://localhost:8082
    description: API Gateway (primary entry point)
  - url: http://localhost:0
    description: UserAccountService (dynamic port)

security:
  - bearerAuth: []

tags:
  - name: Auth
    description: User authentication endpoints (no JWT required)
  - name: Users
    description: User management endpoints (JWT required, gateway-only)
  - name: Accounts
    description: Account management endpoints
  - name: Documents
    description: Document template and PDF generation endpoints

paths:

  # ─── Auth endpoints ───

  /user/login:
    post:
      tags: [Auth]
      summary: Authenticate user and receive JWT token
      description: Returns access token (1hr expiry) and refresh token (12hr expiry)
      operationId: loginUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRequest'
      responses:
        '200':
          description: Authentication successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
            application/xml:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'

  /users/auth/reg:
    post:
      tags: [Auth]
      summary: Register a new user
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          description: Invalid input

  /users/auth/signIn:
    post:
      tags: [Auth]
      summary: User sign-in (alias for /user/login)
      operationId: signIn
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRequest'
      responses:
        '200':
          description: Authentication successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Invalid credentials

  /users/auth/forgot-password:
    post:
      tags: [Auth]
      summary: Request password reset
      description: Sends reset link to user email (TODO: email integration not yet implemented)
      operationId: forgotPassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserDTO'
      responses:
        '200':
          description: Reset link sent

  # ─── Users endpoints ───

  /users/status/check:
    get:
      tags: [Users]
      security: []
      summary: Health check for UserAccountService
      operationId: userStatusCheck
      responses:
        '200':
          description: Service is running
          content:
            text/plain:
              schema:
                type: string
                example: UserAccountService is running on port 61234

  /users/all:
    get:
      tags: [Users]
      summary: Get all users (gateway IP restricted)
      operationId: getAllUsers
      responses:
        '200':
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserResponse'
        '403':
          description: Forbidden — request not from gateway IP

  /users/update/{id}:
    put:
      tags: [Users]
      summary: Update user (gateway IP restricted)
      operationId: updateUser
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserDTO'
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'

  # ─── Account endpoints ───

  /account/status/check:
    get:
      tags: [Accounts]
      summary: Health check for AccountManagment service
      operationId: accountStatusCheck
      responses:
        '200':
          description: Service is running
          content:
            text/plain:
              schema:
                type: string
                example: AccountManagement is running

  # ─── Document endpoints ───

  /docs/status/check:
    get:
      tags: [Documents]
      summary: Health check for doc-manager service
      operationId: docStatusCheck
      responses:
        '200':
          description: Service is running

  /docs/uploadTemplate:
    post:
      tags: [Documents]
      summary: Upload a DOCX template file
      operationId: uploadTemplate
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: Template uploaded
          content:
            application/json:
              schema:
                type: string

  /docs/generatePdf:
    post:
      tags: [Documents]
      summary: Generate a PDF from a template and data
      operationId: generatePdf
      parameters:
        - name: template
          in: query
          required: false
          schema:
            type: string
          description: Template name (defaults to latest uploaded)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                type: string
              description: Data values to populate placeholders
      responses:
        '200':
          description: Generated PDF
          content:
            application/pdf:
              schema:
                type: string
                format: binary

  /docs/templates:
    get:
      tags: [Documents]
      summary: List available templates
      operationId: listTemplates
      responses:
        '200':
          description: List of template names
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Obtain token via POST /user/login or POST /users/auth/signIn

  schemas:
    AuthRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string
          format: password

    AuthResponse:
      type: object
      properties:
        token:
          type: string
          description: Access token (HS256, 1hr expiry)
        expiresIn:
          type: string
          format: date-time
        tokenType:
          type: string
          example: bearer
        refreshToken:
          type: string
          description: Refresh token (HS512, 12hr expiry)
        refreshExpiresIn:
          type: string
          format: date-time

    CreateUserRequest:
      type: object
      required: [firstName, lastName, password]
      properties:
        firstName:
          type: string
          minLength: 2
        lastName:
          type: string
          minLength: 2
        password:
          type: string
          minLength: 6
          maxLength: 20
        email:
          type: string
          format: email

    UserResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string

    UserDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        password:
          type: string

    ErrorMessage:
      type: object
      properties:
        message:
          type: string
